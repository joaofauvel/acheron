services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  orchestrator:
    build:
      context: .
      target: orchestrator
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8080:8080"
    environment:
      ACHERON_URL: http://orchestrator:8000
    depends_on:
      - orchestrator

  tts-stub:
    build:
      context: .
      target: worker-stub
    ports:
      - "8001:8001"
    environment:
      WORKER_TYPE: TTS
      WORKER_ENDPOINT: http://tts-stub:8001
      ORCHESTRATOR_URL: http://orchestrator:8000
      WORKER_PORT: "8001"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
    depends_on:
      - orchestrator

  asr-stub:
    build:
      context: .
      target: worker-stub
    ports:
      - "8002:8002"
    environment:
      WORKER_TYPE: ASR
      WORKER_ENDPOINT: http://asr-stub:8002
      ORCHESTRATOR_URL: http://orchestrator:8000
      WORKER_PORT: "8002"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
    depends_on:
      - orchestrator

  tts-grpc-stub:
    build:
      context: .
      target: grpc-stub
    ports:
      - "9001:9001"
    environment:
      WORKER_ENDPOINT: http://tts-grpc-stub:9001
      ORCHESTRATOR_URL: http://orchestrator:8000
      WORKER_PORT: "9001"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
    depends_on:
      - orchestrator

  translation-stub:
    build:
      context: .
      target: worker-stub
    ports:
      - "8003:8003"
    environment:
      WORKER_TYPE: TRANSLATION
      WORKER_ENDPOINT: http://translation-stub:8003
      ORCHESTRATOR_URL: http://orchestrator:8000
      WORKER_PORT: "8003"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
    depends_on:
      - orchestrator
    command: ["sh", "-c", "uvicorn stubs.translation_stub:create_app --factory --host 0.0.0.0 --port ${WORKER_PORT:-8003}"]
