services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  orchestrator:
    build:
      context: .
      target: orchestrator
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
      ACHERON_DATA_DIR: /data/jobs
      ACHERON_TLS_CERT_FILE: /certs/orchestrator.crt
      ACHERON_TLS_KEY_FILE: /certs/orchestrator.key
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - acheron-data:/data
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import os, ssl, urllib.request; ctx = ssl.create_default_context(cafile=os.environ.get('SSL_CERT_FILE')); urllib.request.urlopen('https://localhost:8000/health', context=ctx).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8080:8080"
    environment:
      ACHERON_URL: https://orchestrator:8000
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy

  tts-stub:
    build:
      context: .
      target: worker-stub
    ports:
      - "8001:8001"
    environment:
      WORKER_TYPE: TTS
      WORKER_ENDPOINT: https://tts-stub:8001
      ORCHESTRATOR_URL: https://orchestrator:8000
      WORKER_PORT: "8001"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
      ACHERON_TLS_CERT_FILE: /certs/tts-stub.crt
      ACHERON_TLS_KEY_FILE: /certs/tts-stub.key
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import os, ssl, urllib.request; ctx = ssl.create_default_context(cafile=os.environ.get('SSL_CERT_FILE')); urllib.request.urlopen(f'https://localhost:{__import__(\"os\").environ[\"WORKER_PORT\"]}/health', context=ctx).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy

  asr-stub:
    build:
      context: .
      target: worker-stub
    ports:
      - "8002:8002"
    environment:
      WORKER_TYPE: ASR
      WORKER_ENDPOINT: https://asr-stub:8002
      ORCHESTRATOR_URL: https://orchestrator:8000
      WORKER_PORT: "8002"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
      ACHERON_TLS_CERT_FILE: /certs/asr-stub.crt
      ACHERON_TLS_KEY_FILE: /certs/asr-stub.key
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import os, ssl, urllib.request; ctx = ssl.create_default_context(cafile=os.environ.get('SSL_CERT_FILE')); urllib.request.urlopen(f'https://localhost:{__import__(\"os\").environ[\"WORKER_PORT\"]}/health', context=ctx).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy

  tts-grpc-stub:
    build:
      context: .
      target: grpc-stub
    ports:
      - "9001:9001"
      - "9002:9002"
    environment:
      WORKER_ENDPOINT: tts-grpc-stub:9001
      ORCHESTRATOR_URL: https://orchestrator:8000
      WORKER_PORT: "9001"
      WORKER_HTTP_PORT: "9002"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
      ACHERON_TLS_CERT_FILE: /certs/tts-grpc-stub.crt
      ACHERON_TLS_KEY_FILE: /certs/tts-grpc-stub.key
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:9002/health').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy

  translation-stub:
    build:
      context: .
      target: worker-stub
    ports:
      - "8003:8003"
    environment:
      WORKER_TYPE: TRANSLATION
      WORKER_ENDPOINT: https://translation-stub:8003
      ORCHESTRATOR_URL: https://orchestrator:8000
      WORKER_PORT: "8003"
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:-dev-registration-token}
      ACHERON_TLS_CERT_FILE: /certs/translation-stub.crt
      ACHERON_TLS_KEY_FILE: /certs/translation-stub.key
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import os, ssl, urllib.request; ctx = ssl.create_default_context(cafile=os.environ.get('SSL_CERT_FILE')); urllib.request.urlopen(f'https://localhost:{__import__(\"os\").environ[\"WORKER_PORT\"]}/health', context=ctx).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy
    command: ["python", "-m", "stubs.translation_stub"]

volumes:
  acheron-data:
  redis-data:
