services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

  # One-shot: generates dev certs into the shared `certs/` bind mount on first
  # `docker compose up` so a fresh clone works without a separate `just certs` step.
  # Re-running on an existing certs/ overwrites the files (idempotent), so this is
  # safe on every `up`.
  certs-init:
    build:
      context: .
      target: certs-init
    volumes:
      - ./certs:/certs
    restart: "no"

  orchestrator:
    build:
      context: .
      target: orchestrator
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:?ACHERON_REGISTRATION_TOKEN must be set}
      ACHERON_DATA_DIR: /data/jobs
      ACHERON_TLS_CERT_FILE: /certs/orchestrator.crt
      ACHERON_TLS_KEY_FILE: /certs/orchestrator.key
      ACHERON_TLS_CA_FILE: /certs/acheron-ca.crt
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - acheron-data:/data
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import os, ssl, urllib.request; ctx = ssl.create_default_context(cafile=os.environ.get('SSL_CERT_FILE')); urllib.request.urlopen('https://localhost:8000/health', context=ctx).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      certs-init:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8080:8080"
    environment:
      ACHERON_URL: https://orchestrator:8000
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy

  tts-local-stub:
    build:
      context: .
      target: worker-stub-base
    ports:
      - "8001:8001"
    environment: &stub_env
      WORKER_NAME: tts-local-stub
      ACHERON_WORKER__ORCHESTRATOR_URL: https://orchestrator:8000
      ACHERON_WORKER__WORKER_ID: tts-local-stub
      ACHERON_REGISTRATION_TOKEN: ${ACHERON_REGISTRATION_TOKEN:?ACHERON_REGISTRATION_TOKEN must be set}
      ACHERON_WORKER__PRICE_SOURCE: zero
      ACHERON_WORKER__LISTEN_PORT: "8001"
      SSL_CERT_FILE: /certs/acheron-ca.crt
    volumes:
      - ./certs:/certs:ro
    command: ["python", "-m", "stubs.tts_local_stub.main"]
    healthcheck: &stub_healthcheck
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy

  asr-local-stub:
    build:
      context: .
      target: worker-stub-base
    ports:
      - "8002:8002"
    environment:
      <<: *stub_env
      WORKER_NAME: asr-local-stub
      ACHERON_WORKER__WORKER_ID: asr-local-stub
      ACHERON_WORKER__LISTEN_PORT: "8002"
    volumes:
      - ./certs:/certs:ro
    command: ["python", "-m", "stubs.asr_local_stub.main"]
    healthcheck:
      <<: *stub_healthcheck
      test:
        - "CMD-SHELL"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"
    depends_on:
      orchestrator:
        condition: service_healthy

  translation-local-stub:
    build:
      context: .
      target: worker-stub-base
    ports:
      - "8003:8003"
    environment:
      <<: *stub_env
      WORKER_NAME: translation-local-stub
      ACHERON_WORKER__WORKER_ID: translation-local-stub
      ACHERON_WORKER__LISTEN_PORT: "8003"
    volumes:
