syntax = "proto3";

service Synthesis {
  rpc Synthesize(SynthesisRequest) returns (stream AudioChunk);
}

message SynthesisRequest {
  string job_id = 1;
  string text = 2;
  string language = 3;
  string model = 4;
}

message AudioChunk {
  bytes pcm_data = 1;
  int32 sample_rate = 2;
  int32 channels = 3;
}
