[project]
name = "acheron"
version = "0.1.0"
description = "Distributed asynchronous audio-transformation pipeline for converting EPUB or audio input into offline chapterized audiobooks in a target language"
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
authors = [{ name = "Julia" }]
dependencies = [
    "click~=8.4",
    "fastapi~=0.137",
    "httpx~=0.28",
    "jinja2~=3.1",
    "nltk~=3.9",
    "redis~=5.3",
    "rich~=14.3",
    "tenacity~=9.1",
    "uvicorn[standard]~=0.49",
]

[project.scripts]
acheron = "acheron.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/acheron"]

[tool.ruff]
target-version = "py314"
line-length = 120
src = ["src", "tests"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"


[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812",
    "CPY001",
    "D203",
    "D211",
    "D213",
    "D100",
    "D104",
    "D105",
    "EM101",
    "FIX002",
    "ISC001",
    "TD002",
    "TD003",
    "TRY003",
]
fixable = ["ALL"]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "S", "PLC0415"]

[tool.mypy]
strict = true
pretty = true
show_error_codes = true
warn_unreachable = true
disallow_any_generics = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_reexport = true
warn_unused_ignores = true
explicit_package_bases = true
mypy_path = "src:stubs"

[tool.pytest.ini_options]
xfail_strict = true
addopts = "--strict-markers --cov=acheron --cov-report=term-missing --cov-fail-under=80"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "inline-snapshot~=0.34",
    "mypy~=2.1",
    "pytest~=9.1",
    "pytest-asyncio~=1.4",
    "pytest-cov~=7.1",
    "pytest-xdist~=3.8",
    "respx~=0.23",
    "ruff~=0.15",
]
