{% if jobs %}
<table>
  <thead>
    <tr><th>Job ID</th><th>Status</th><th>Steps Completed</th></tr>
  </thead>
  <tbody>
    {% for j in jobs %}
    <tr>
      <td>{{ j.job_id }}</td>
      <td><span class="badge badge-{{ j.status }}">{{ j.status }}</span></td>
      <td>{{ j.completed_steps }}/{{ j.total_steps }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p style="color:#8b949e">No cost data available.</p>
{% endif %}
